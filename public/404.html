<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Redirecting…</title>
    <script>
      const pathSegmentsToKeep = 1
      const location = window.location
      const redirectPath = location.pathname
        .split('/')
        .slice(0, 1 + pathSegmentsToKeep)
        .join('/')

      const remainingPath = location.pathname
        .split('/')
        .slice(1 + pathSegmentsToKeep)
        .join('/')

      const encodedPath = remainingPath.replace(/&/g, '~and~')
      const encodedSearch = location.search
        ? `&${location.search.slice(1).replace(/&/g, '~and~')}`
        : ''

      const redirectUrl = `${location.origin}${redirectPath}/?/${encodedPath}${encodedSearch}${location.hash}`
      location.replace(redirectUrl)
    </script>
  </head>
  <body></body>
</html>
