<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Redirecting…</title>
    <script>
      const pathSegmentsToKeep = 1
      const pageLocation = window.location
      const redirectPath = pageLocation.pathname
        .split('/')
        .slice(0, 1 + pathSegmentsToKeep)
        .join('/')

      const remainingPath = pageLocation.pathname
        .split('/')
        .slice(1 + pathSegmentsToKeep)
        .join('/')

      const encodedPath = remainingPath.replace(/&/g, '~and~')
      const encodedSearch = pageLocation.search
        ? `&${pageLocation.search.slice(1).replace(/&/g, '~and~')}`
        : ''

      const redirectUrl = `${pageLocation.origin}${redirectPath}/?/${encodedPath}${encodedSearch}${pageLocation.hash}`
      pageLocation.replace(redirectUrl)
    </script>
  </head>
  <body></body>
</html>
